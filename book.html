<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>GameZone - Book Slot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* Hide scrollbar for chronological calendar scrolling */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 font-inter antialiased pb-24">

  <!-- Top Header Mobile -->
  <header class="bg-white/90 backdrop-blur-md sticky top-0 z-40 border-b border-gray-200 px-4 py-3 flex items-center justify-between shadow-sm">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white">
        <i data-lucide="calendar-check" class="w-5 h-5"></i>
      </div>
      <span class="font-bold text-lg tracking-tight">Reserve Slot</span>
    </div>
  </header>

  <div class="w-full h-1 bg-gradient-to-r from-blue-500 to-purple-500"></div>

  <main class="w-full max-w-md mx-auto sm:my-8 sm:bg-white sm:shadow-xl sm:rounded-3xl sm:border border-gray-100 sm:overflow-hidden sm:min-h-[800px] relative">
    
    <section class="p-4 pt-6 pb-24">
      
      <!-- Console Selection -->
      <section class="mb-8">
        <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3">1. Select Rig</h2>
        <div class="flex gap-3" id="rig-selector">
          <div class="flex-1 bg-white rounded-xl p-4 border-2 border-blue-500 shadow-[0_4px_12px_rgba(59,130,246,0.15)] relative overflow-hidden rig-card" data-console="PS5">
            <div class="absolute top-0 right-0 p-2 text-blue-500 check-icon"><i data-lucide="check-circle-2" class="w-5 h-5 fill-white"></i></div>
            <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mb-3">
              <i data-lucide="tv" class="w-5 h-5"></i>
            </div>
            <h3 class="font-bold text-gray-900">PS5</h3>
          </div>
          
          <div class="flex-1 bg-white rounded-xl p-4 border border-gray-200 shadow-sm relative opacity-60 rig-card cursor-pointer transition-all" data-console="PC">
            <div class="w-10 h-10 bg-purple-50 text-purple-600 rounded-full flex items-center justify-center mb-3">
              <i data-lucide="pc-case" class="w-5 h-5"></i>
            </div>
            <h3 class="font-bold text-gray-900">PC Node</h3>
          </div>
        </div>
      </section>

      <form id="app-booking-form" class="space-y-6">
        
        <!-- Game Dropdown -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4">
          <label class="block text-xs font-bold text-gray-700 mb-2 uppercase tracking-wide">2. Select Event / Game</label>
          <div class="relative">
            <select id="b-game" required class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm font-semibold rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3.5 pr-10 appearance-none outline-none transition-all">
              <option value="" disabled selected>Loading Library...</option>
            </select>
            <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5 pointer-events-none"></i>
          </div>
        </div>

        <!-- Custom Calendar Scroll -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4">
          <label class="block text-xs font-bold text-gray-700 mb-3 uppercase tracking-wide">3. Select Date</label>
          <input type="hidden" id="b-date" required>
          <div id="custom-date-scroll" class="flex gap-3 overflow-x-auto pb-2 snap-x scrollbar-hide select-none cursor-pointer">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- Custom Time Grid -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 opacity-50 pointer-events-none transition-opacity" id="time-container">
          <div class="flex justify-between items-center mb-4">
            <label class="block text-xs font-bold text-gray-700 uppercase tracking-wide">4. Select Time</label>
            <span id="slot-status" class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2.5 py-1 rounded-full border border-blue-100">Pick a date first</span>
          </div>
          <input type="hidden" id="b-slot" required>
          <div id="custom-time-grid" class="grid grid-cols-3 gap-2.5">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- Persona Details -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 grid grid-cols-2 gap-4">
          <div class="col-span-2">
            <label class="block text-xs font-bold text-gray-700 mb-2 uppercase tracking-wide">5. Your Details</label>
            <input type="text" id="b-name" required placeholder="Full Name" class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm font-semibold rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3.5 outline-none mb-3 placeholder-gray-400" />
            <input type="tel" id="b-phone" required pattern="[0-9]{10}" placeholder="Phone Number (10 digits)" class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm font-semibold rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3.5 outline-none placeholder-gray-400" />
          </div>
        </div>

        <!-- Submit -->
        <div class="pt-2 flex items-center justify-between">
          <div class="flex flex-col">
            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Total</span>
            <span class="text-2xl font-black text-gray-900 tracking-tight">₹99</span>
          </div>
          <button type="submit" id="b-submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-full px-8 py-4 flex items-center gap-2 shadow-lg shadow-blue-500/30 transition-all active:scale-95 disabled:opacity-70 disabled:active:scale-100">
            <span id="b-btn-text">Confirm Booking</span>
            <i data-lucide="arrow-right" class="w-5 h-5 relative -top-px"></i>
          </button>
        </div>
      </form>
      
      <!-- Feedback Modal -->
      <div id="frontend-msg" class="hidden mt-6 p-4 rounded-xl text-sm font-bold text-center border"></div>
      
    </section>

    <!-- Bottom App Navigation -->
    <nav class="fixed bottom-0 left-0 w-full sm:absolute sm:bottom-0 sm:left-0 sm:w-full bg-white/90 backdrop-blur-xl border-t border-gray-200 px-6 py-3 pb-safe z-50 flex justify-between items-center z-50">
      <a href="/" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-900 active:scale-90 transition-transform">
        <i data-lucide="home" class="w-6 h-6"></i>
        <span class="text-[10px] font-semibold">Home</span>
      </a>
      <a href="/library" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-900 active:scale-90 transition-transform">
        <i data-lucide="library" class="w-6 h-6"></i>
        <span class="text-[10px] font-semibold">Library</span>
      </a>
      <a href="/book" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-900 active:scale-90 transition-transform translate-y-[-10px] relative z-10">
        <div class="w-12 h-12 bg-blue-600 text-white rounded-full flex items-center justify-center shadow-lg shadow-blue-600/40 border-4 border-gray-50">
          <i data-lucide="calendar-plus" class="w-5 h-5"></i>
        </div>
      </a>
      <a href="/location" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-900 active:scale-90 transition-transform">
        <i data-lucide="map" class="w-6 h-6"></i>
        <span class="text-[10px] font-semibold">Location</span>
      </a>
      <a href="/login" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-900 active:scale-90 transition-transform">
        <i data-lucide="user-circle" class="w-6 h-6"></i>
        <span class="text-[10px] font-semibold">Login</span>
      </a>
    </nav>
  </main>
  
  <script type="module" src="/src/main.js"></script>
</body>
</html>
